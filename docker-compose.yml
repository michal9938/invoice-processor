version: '3.8'

services:
  invoice-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice-control-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - HOST=0.0.0.0
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

