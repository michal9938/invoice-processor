steps:
  # Debug: Print substitution variables to verify they're set
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=========================================="
        echo "Checking substitution variables:"
        echo "_NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL:-NOT SET}"
        echo "_NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY:-NOT SET}"
        echo "=========================================="
        if [ -z "${_NEXT_PUBLIC_SUPABASE_URL}" ] || [ -z "${_NEXT_PUBLIC_SUPABASE_ANON_KEY}" ]; then
          echo "ERROR: Required substitution variables are not set!"
          echo "Please set them in your Cloud Build trigger configuration."
          exit 1
        fi

  # Build the container image with build arguments for Next.js public env vars
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/invoice-processor:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/invoice-processor:latest'
      - '.'
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/invoice-processor:$COMMIT_SHA']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/invoice-processor:latest']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'invoice-processor'
      - '--image'
      - 'gcr.io/$PROJECT_ID/invoice-processor:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'PORT=8080'

images:
  - 'gcr.io/$PROJECT_ID/invoice-processor:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/invoice-processor:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Note: Substitutions for NEXT_PUBLIC_* variables must be set in Cloud Build trigger configuration
# or passed via command line. See DEPLOYMENT.md for instructions.

timeout: '1800s'
